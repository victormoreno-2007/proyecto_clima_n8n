# =============================================
# Servidor
# =============================================
server.port=3001

# =============================================
# Base de datos MySQL
# =============================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/proyecto_n8n?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# n8n Webhook URL
# =============================================
n8n.webhook.url=https://renunciative-velma-spartanly.ngrok-free.dev/webhook/clima-ruta
